<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Riwayat — Mechanomyography</title>
<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 40% at 75% 10%,rgba(26,71,42,.06) 0,transparent 65%);pointer-events:none;}
.h-chart{height:300px;position:relative;background:#ffffff;border:1px solid var(--border);border-radius:12px;overflow:hidden;padding:20px;}
.h-chart canvas{display:block;width:100%!important;height:100%!important;}
</style>
</head>
<body>

<nav class="topbar">
  <a class="logo" href="dashboard.html">Mechanomyography</a>
  <div class="topbar-nav">
    <a class="nav-a" href="dashboard.html">Dashboard</a>
    <a class="nav-a" href="live.html">MMG Live</a>
    <a class="nav-a active" href="history.html">Riwayat</a>
    <a class="nav-a" href="profile.html">Profil</a>
  </div>
  <div class="flex items-c gap2">
    <div class="u-avatar" id="top-avatar">?</div>
    <span class="sm muted" id="top-name">—</span>
    <button class="btn btn-o btn-sm" onclick="Auth.logout()">Keluar</button>
  </div>
</nav>

<div class="wrap">
  <div class="flex jb items-c mb6">
    <div>
      <h1 class="serif" style="font-size:26px;margin-bottom:4px">Riwayat Rehabilitasi</h1>
      <p class="sm muted">Progres kekuatan otot tangan dari waktu ke waktu.</p>
    </div>
  </div>

  <div class="g3 mb6">
    <div class="card tc">
      <div class="card-title">Total Sesi</div>
      <div class="serif" style="font-size:44px" id="s-total">—</div>
      <div class="sm muted">sesi rekaman</div>
    </div>
    <div class="card tc">
      <div class="card-title">Force Terbaik</div>
      <div class="serif" style="font-size:44px;color:#20b2aa" id="s-best">—</div>
      <div class="sm muted">Newton</div>
    </div>
    <div class="card tc">
      <div class="card-title">Rata-rata Force</div>
      <div class="serif" style="font-size:44px;color:var(--yellow)" id="s-avg">—</div>
      <div class="sm muted">Newton</div>
    </div>
  </div>

  <div class="card mb6" style="background:var(--bg);">
    <div class="flex jb items-c" style="margin-bottom:16px">
      <div class="card-title" style="margin:0">Tren Kekuatan Otot (Newton)</div>
    </div>
    <div class="h-chart">
      <canvas id="gripChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Daftar Sesi</div>
    <div style="overflow-x:auto">
      <table class="tbl">
        <thead>
          <tr>
            <th>ID / Tanggal</th>
            <th>Durasi</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="sess-body"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const user = Auth.requireLogin(); if (!user) throw 0;
Auth.fillTopbar();

let forceChartInstance = null;
const norm = calcNorm(user.gender, user.age, user.weight);
const normMinN = norm.min;
const normAvgN = norm.avg;

async function loadHistory() {
  const events = await Firebase.fetchEvents();
  let sessions = [];
  try {
    const r = await API.getSessions();
    sessions = r.data || [];
  } catch {}

  const forces = events.map(e => e.force).filter(f => f > 0);
  setText('s-total', sessions.length);
  setText('s-best',  forces.length ? Math.max(...forces).toFixed(3) : '—');
  setText('s-avg',   forces.length ? (forces.reduce((a,b)=>a+b,0)/forces.length).toFixed(3) : '—');

  drawChartFromEvents(events);
  renderTable(sessions);
}

function renderTable(sessions) {
  document.getElementById('sess-body').innerHTML = sessions.map(s=>`
    <tr>
      <td>${formatDate(s.started_at)}</td>
      <td>${s.duration_seconds ? formatDur(s.duration_seconds) : '—'}</td>
      <td><span class="badge b-ok">Selesai</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-o btn-sm" onclick="exportPDFHistory()">PDF</button>
          <button class="btn btn-o btn-sm" onclick="exportToSVG(window.__fb_events, 'Riwayat Keseluruhan Sesi')">SVG</button>
          <button class="btn btn-o btn-sm" onclick="doDelete(${s.id})">Hapus</button>
        </div>
      </td>
    </tr>`).join('') || `<tr><td colspan="4" class="tc muted py-4">Belum ada sesi rekaman.</td></tr>`;
}

function exportPDFHistory() {
  const win = window.open('', '_blank');
  const events = window.__fb_events || [];
  
  if(events.length === 0) {
      showToast('Tidak ada data riwayat untuk diexport.', 'error');
      return;
  }

  const totalData = events.length;
  const sum = events.reduce((acc, curr) => acc + curr.force, 0);
  const overallAvg = (sum / totalData).toFixed(2);
  
  let trendText = "Data tidak cukup untuk melihat tren";
  if (totalData > 5) {
      const sliceCount = Math.max(Math.floor(totalData * 0.3), 1);
      const firstPart = events.slice(0, sliceCount);
      const lastPart = events.slice(-sliceCount);

      const avgFirst = firstPart.reduce((a, b) => a + b.force, 0) / sliceCount;
      const avgLast = lastPart.reduce((a, b) => a + b.force, 0) / sliceCount;

      const diff = avgLast - avgFirst;
      if (diff > 5) trendText = "🟢 Meningkat (Progres kekuatan otot membaik)";
      else if (diff < -5) trendText = "🔴 Menurun (Mengindikasikan kelelahan / fatigue)";
      else trendText = "🟡 Stabil (Tidak ada perubahan signifikan)";
  }

  let qualityText = "Kurang Baik (Di bawah batas minimal)";
  if (overallAvg >= normAvgN) qualityText = "Sangat Baik (Mencapai rata-rata normal)";
  else if (overallAvg >= normMinN) qualityText = "Baik (Berada di atas batas minimal)";

  const rows = events.slice(-100).map(e => {
    let stat = 'Rendah';
    if (e.force >= normAvgN) stat = 'Normal';
    else if (e.force >= normMinN) stat = 'Sedang';

    return `<tr><td>${new Date(e.timestamp).toLocaleString('id-ID')}</td><td>${e.force.toFixed(3)} N</td><td>${stat}</td></tr>`;
  }).join('');
  
  win.document.write(`<html><head><title>Laporan Historis MMG</title>
    <style>
      body{font-family:Arial;padding:30px;}h1{color:#20b2aa;}
      table{width:100%;border-collapse:collapse;margin-top:20px;font-size:14px;}
      th,td{border:1px solid #ccc;padding:8px;}th{background:#20b2aa;color:#fff;}
      .summary-box { background: #f9f9f9; border: 1px solid #ddd; padding: 20px; margin-top: 30px; border-radius: 8px; }
      .summary-box h3 { margin-top: 0; color: #333; margin-bottom: 12px; }
      .summary-box p { margin: 6px 0; font-size: 15px; }
    </style></head>
    <body>
      <h1>Laporan Historis Mechanomyography</h1>
      <p><b>Pasien:</b> ${user.name||'—'} &nbsp;|&nbsp; <b>Tanggal Export:</b> ${new Date().toLocaleDateString('id-ID')}</p>
      <p><b>Target Rata-rata Normal:</b> ${normAvgN.toFixed(2)} N</p>
      
      <table><tr><th>Waktu</th><th>Force</th><th>Status</th></tr>
      ${rows}</table>

      <div class="summary-box">
        <h3>📊 Kesimpulan & Analisis Historis</h3>
        <p><b>Total Data Terekam:</b> ${totalData} titik bacaan</p>
        <p><b>Rata-rata Kekuatan Keseluruhan:</b> ${overallAvg} N</p>
        <p><b>Kondisi Keseluruhan:</b> ${qualityText}</p>
        <p><b>Tren / Progres Rehabilitasi:</b> ${trendText}</p>
      </div>
    </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

async function doDelete(id) {
    const pass = prompt("Sesi ini akan dihapus permanen. Masukkan password akun Anda untuk melanjutkan:");
    if (pass === null) return;
    if (pass === user.password) {
        await API.deleteSession(id);
        showToast('Sesi berhasil dihapus','success');
        loadHistory();
    } else {
        showToast('Password salah! Gagal menghapus','error');
    }
}

function drawChartFromEvents(events) {
  if (forceChartInstance) { forceChartInstance.destroy(); }
  const canvas = document.getElementById('gripChart');
  const ctx    = canvas.getContext('2d');

  if (!events || events.length < 2) return;
  window.__fb_events = events; 

  const labels = events.map(e => new Date(e.timestamp).toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }));
  const forceVals = events.map(e => parseFloat(e.force.toFixed(3)));

  const gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, 'rgba(32, 178, 170, 0.5)'); 
  gradient.addColorStop(1, 'rgba(32, 178, 170, 0)');

  forceChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
          label: 'Force (N)',
          data: forceVals,
          borderColor: '#20b2aa',
          borderWidth: 3,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#20b2aa',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          backgroundColor: gradient,
          tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.95)',
          borderColor: '#e0e0e0',
          borderWidth: 1,
          titleColor: '#666',
          bodyColor: '#333',
          padding: 10
        }
      },
      scales: {
        x: {
          ticks: { color: '#888', font: { size: 11, family: 'Outfit, sans-serif' } },
          grid: { color: 'rgba(0,0,0,0.04)', drawBorder: false }
        },
        y: {
          min: 0,
          ticks: { color: '#888', font: { size: 11, family: 'Outfit, sans-serif' }, callback: v => v.toFixed(1) + ' N' },
          grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false }
        }
      }
    }
  });
}

loadHistory();
</script>
</body>
</html>
